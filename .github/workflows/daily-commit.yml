name: Daily Automated Commit

on:
  schedule:
    # Runs at 14:30 UTC every day. (Do not use * * * * *)
    - cron: '30 14 * * *'
  # Important: workflow_dispatch lets you trigger it manually right now!
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: allows GitHub actions to push to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update daily log and commit (Student: 22f2000537@ds.study.iitm.ac.in)
        run: |
          # Configure Git
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Add a simple update to a log file
          echo "Automated run on $(date)" >> activity_log.txt
          
          # Commit the changes back to the repository
          git add activity_log.txt
          git commit -m "Automated daily update"
          git push
