name: Daily Auto Commit

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update daily log - 22f2000537@ds.study.iitm.ac.in
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          echo "Automated run on $(date -u)" >> activity_log.txt
          git add activity_log.txt
          git commit -m "chore: daily automated commit $(date -u '+%Y-%m-%d')"
          git push
